spring.application.name=ShoeManagementProject-1

# ─── DEV Database (localhost) ─────────────────────────────────────────────────
# Production: dùng application-prod.properties với env vars DB_URL/DB_USERNAME/DB_PASSWORD
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ShoeEffDB;encrypt=true;trustServerCertificate=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:1}

# Hibernate & JPA — dev settings (production overrides in application-prod.properties)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Batch insert/update — giảm số round-trip đến DB khi dùng saveAll()
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Thymeleaf — dev mode (không cache)
spring.thymeleaf.cache=false

# i18n Configuration
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

server.forward-headers-strategy=framework

# File upload limit
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB