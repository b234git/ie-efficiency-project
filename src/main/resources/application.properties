spring.application.name=ShoeManagementProject-1

# ─── DEV Database (localhost) ─────────────────────────────────────────────────
# Production: dùng application-prod.properties với env vars DB_URL/DB_USERNAME/DB_PASSWORD
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ShoeEffDB;encrypt=true;trustServerCertificate=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:1}

# Hibernate & JPA — dev settings (production overrides in application-prod.properties)
# Flyway quản lý schema — dùng validate thay vì update
spring.jpa.hibernate.ddl-auto=validate

# Flyway — tự động tạo/migrate schema
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate=true: cho phép Flyway chạy trên DB đã có sẵn (dev)
# Flyway sẽ đánh dấu DB hiện tại là V1 và không chạy lại migration đó
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Batch insert/update — giảm số round-trip đến DB khi dùng saveAll()
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Thymeleaf — dev mode (không cache)
spring.thymeleaf.cache=false

# i18n Configuration
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

server.forward-headers-strategy=framework

# Session timeout
server.servlet.session.timeout=30m

# File upload limit
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB