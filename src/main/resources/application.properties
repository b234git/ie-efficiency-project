spring.application.name=ShoeManagementProject-1

# Dev-only seed passwords. Production must set APP_DEFAULT_ADMIN_PASSWORD / APP_DEFAULT_MANAGER_PASSWORD env vars.
app.default-admin-password=${APP_DEFAULT_ADMIN_PASSWORD:Admin@123}
app.default-manager-password=${APP_DEFAULT_MANAGER_PASSWORD:Manager@123}

# ─── DEV Database (localhost) ─────────────────────────────────────────────────
# Production: dùng application-prod.properties với env vars DB_URL/DB_USERNAME/DB_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/shoe_eff_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:phatminh11235}

# Hibernate & JPA — dev settings (production overrides in application-prod.properties)
# Flyway quản lý schema (V1..V9 trong db/migration). ddl-auto vẫn dùng update để
# Hibernate có thể thêm cột mới mà chưa kịp viết migration; chuyển sang validate
# khi schema đã ổn định.
spring.jpa.hibernate.ddl-auto=update

# Flyway — Spring Boot 4 cần thêm module spring-boot-flyway (đã add vào pom) thì
# auto-configuration mới chạy; trước đó flyway-core nằm im và schema do ddl-auto=update tạo.
# baseline-on-migrate cho phép áp dụng migration lên DB đã tồn tại (dev/prod hiện có).
# baseline-version=16: DB hiện có (schema đã tới V16 qua ddl-auto/chạy tay) được đánh dấu
# là V16 — V17 catch-up idempotent sẽ tự vá phần nào còn thiếu; DB rỗng chạy đủ V1..V17.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=16
logging.level.org.flywaydb=INFO
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.transaction.interceptor=TRACE

# Batch insert/update — giảm số round-trip đến DB khi dùng saveAll()
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Thymeleaf — dev mode (không cache)
spring.thymeleaf.cache=false

# Date format — render LocalDate dạng ISO để <input type="date"> đổ đúng value
# (mặc định locale vi cho ra d/M/yy khiến ô ngày bị bỏ trống). Áp dụng cả prod.
spring.mvc.format.date=yyyy-MM-dd

# i18n Configuration
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

server.forward-headers-strategy=framework

# Session timeout
server.servlet.session.timeout=30m

# File upload limit
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ─── Actuator / Monitoring ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=IE-Eff
info.app.version=1.0.0

# ─── Resilience4j Circuit Breakers ───────────────────────────────────────────
resilience4j.circuitbreaker.instances.salaryReport.sliding-window-size=5
resilience4j.circuitbreaker.instances.salaryReport.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.salaryReport.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.salaryReport.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.salaryReport.register-health-indicator=true

resilience4j.circuitbreaker.instances.weeklyReport.sliding-window-size=5
resilience4j.circuitbreaker.instances.weeklyReport.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.weeklyReport.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.weeklyReport.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.weeklyReport.register-health-indicator=true

# ─── Quartz Scheduler ─────────────────────────────────────────────────────────
spring.quartz.job-store-type=jdbc
# always = tự tạo bảng Quartz nếu chưa có; dùng never ở prod khi bảng đã tồn tại
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.scheduler.instanceName=IEEffScheduler
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate