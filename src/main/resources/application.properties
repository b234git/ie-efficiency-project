spring.application.name=ShoeManagementProject-1

# ─── DEV Database (localhost) ─────────────────────────────────────────────────
# Production: dùng application-prod.properties với env vars DB_URL/DB_USERNAME/DB_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/shoe_eff_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:phatminh11235}

# Hibernate & JPA — dev settings (production overrides in application-prod.properties)
# Flyway quản lý schema — dùng validate thay vì update
spring.jpa.hibernate.ddl-auto=update

# Flyway — tạm thời tắt do Spring Boot 4 cần cấu hình riêng
spring.flyway.enabled=false
logging.level.org.flywaydb=DEBUG
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Batch insert/update — giảm số round-trip đến DB khi dùng saveAll()
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Thymeleaf — dev mode (không cache)
spring.thymeleaf.cache=false

# i18n Configuration
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

server.forward-headers-strategy=framework

# Session timeout
server.servlet.session.timeout=30m

# File upload limit
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB