<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Import Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .status-card {
            max-width: 560px;
            margin: 48px auto;
            padding: 32px;
            border-radius: 10px;
            border: 1px solid #dee2e6;
            text-align: center;
        }
        .status-icon { font-size: 3rem; margin-bottom: 12px; }
        .status-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
        .status-sub { color: #6c757d; margin-bottom: 24px; font-size: 0.95rem; }
        .progress-bar-wrap {
            background: #e9ecef;
            border-radius: 999px;
            height: 10px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 999px;
            background: #0d6efd;
            transition: width 0.4s ease;
        }
        .error-box {
            background: #f8d7da;
            border: 1px solid #f5c2c7;
            border-radius: 6px;
            padding: 12px 16px;
            color: #842029;
            font-size: 0.9rem;
            text-align: left;
            margin-bottom: 20px;
            word-break: break-word;
        }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 4px solid #dee2e6;
            border-top-color: #0d6efd;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-back {
            display: inline-block;
            padding: 10px 28px;
            background: #0d6efd;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .btn-back:hover { background: #0b5ed7; }
        .btn-retry {
            display: inline-block;
            padding: 10px 28px;
            background: #6c757d;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container-lg">

        <div class="status-card" id="statusCard">

            <!-- PENDING / PROCESSING -->
            <div id="viewPending" th:if="${job.status == 'PENDING' or job.status == 'PROCESSING'}">
                <div class="spinner"></div>
                <div class="status-title">Đang xử lý...</div>
                <div class="status-sub">File đang được nhập vào hệ thống, vui lòng chờ.</div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressFill"
                         th:style="'width:' + ${job.progress} + '%'"></div>
                </div>
                <div style="color:#6c757d; font-size:0.85rem;">Job #<span th:text="${job.id}"></span></div>
            </div>

            <!-- DONE -->
            <div id="viewDone" th:if="${job.status == 'DONE'}">
                <div class="status-icon">✅</div>
                <div class="status-title" style="color:#198754;">Import hoàn tất!</div>
                <div class="status-sub">Dữ liệu đã được lưu thành công vào hệ thống.</div>
                <a th:href="@{/entry}" class="btn-back">← Quay về Entry</a>
            </div>

            <!-- FAILED -->
            <div id="viewFailed" th:if="${job.status == 'FAILED'}">
                <div class="status-icon">❌</div>
                <div class="status-title" style="color:#dc3545;">Import thất bại</div>
                <div class="error-box" th:if="${job.errorMessage}" th:text="${job.errorMessage}"></div>
                <a th:href="@{/entry}" class="btn-back">← Quay về Entry</a>
                <a th:href="@{/entry}" class="btn-retry">Thử lại</a>
            </div>

        </div>

    </div>

    <!-- Poll every 2s while job is still running -->
    <script th:if="${job.status == 'PENDING' or job.status == 'PROCESSING'}"
            th:inline="javascript">
        const jobId  = [[${job.id}]];
        const pollUrl = '/excel/import/jobs/' + jobId + '/poll';

        function poll() {
            fetch(pollUrl)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('progressFill').style.width = data.progress + '%';
                    if (data.status === 'DONE' || data.status === 'FAILED') {
                        window.location.reload();
                    } else {
                        setTimeout(poll, 2000);
                    }
                })
                .catch(() => setTimeout(poll, 3000));
        }

        setTimeout(poll, 2000);
    </script>

</body>
</html>
