<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="#{register.title}">Register</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container" style="max-width: 400px; margin-top: 50px;">
        <h2 th:text="#{register.title}">Register</h2>

        <div th:if="${error}" style="color: red; margin-bottom: 10px;">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="form-group">
                <label th:text="#{login.username}">Username</label>
                <input type="text" th:field="*{username}" class="form-control" required autofocus />
            </div>
            <div class="form-group">
                <label th:text="#{login.password}">Password</label>
                <input type="password" th:field="*{password}" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;"
                th:text="#{register.submit}">Register</button>
        </form>
        <div style="margin-top: 15px; text-align: center;">
            <a th:href="@{/login}" th:text="#{register.login.link}">Already have an account? Login</a>
        </div>
    </div>
</body>

</html>
