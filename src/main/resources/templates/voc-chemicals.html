<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="#{voc.chem.title}">VOC Chemicals</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" th:href="@{/css/voc.css}"/>
    <script th:src="@{/js/voc.js}" defer></script>
    <style>
        /* page-specific add/edit modal (distinct from the shared import/confirm modal) */
        .modal-backdrop2 { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1000; }
        .modal-backdrop2.open { display:flex; align-items:center; justify-content:center; }
        .modal-box { background:#fff; border-radius:8px; padding:22px; width:460px; max-width:94vw; max-height:90vh; overflow:auto; }
        .modal-box label { display:block; font-weight:600; font-size:0.85rem; margin:10px 0 3px; }
    </style>
</head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container-xl" style="padding:20px;">
    <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <div>
            <h2 th:text="#{voc.chem.title}">VOC Chemical Master</h2>
            <p style="color:#6c757d; margin:4px 0 0;" th:text="#{voc.chem.subtitle}">
                Chemicals with their VOC factor and price — the basis for VOC calculation.
            </p>
        </div>
        <div class="voc-toolbar" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
            <a th:href="@{/voc/}" class="btn btn-outline-secondary btn-sm" th:text="#{voc.nav.report}">Report</a>
            <a th:href="@{/voc/recipe}" class="btn btn-outline-secondary btn-sm" th:text="#{voc.nav.recipe}">Recipe</a>
            <a th:href="@{/voc/chemicals/template}" class="btn btn-outline-success btn-sm">Template</a>
            <button class="btn btn-outline-primary btn-sm" onclick="vocOpenImport()" th:text="#{voc.import.title}">Import Excel</button>
            <button class="btn btn-primary btn-sm" onclick="openAdd()" th:text="#{voc.chem.add}">+ Add Chemical</button>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success voc-fade" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
    <div th:replace="~{fragments/voc-fragments :: importResult(${importResult})}"></div>

    <div class="table-wrapper">
        <table class="table">
            <thead>
            <tr>
                <th th:text="#{voc.col.chemical}">Code</th>
                <th th:text="#{voc.col.type}">Type</th>
                <th th:text="#{voc.col.class}">Classification</th>
                <th th:text="#{voc.col.manufacturer}">Manufacturer</th>
                <th class="num" th:text="#{voc.col.factor}">VOC Factor</th>
                <th class="num" th:text="#{voc.col.price}">Price/kg</th>
                <th class="num" th:text="#{voc.chem.unit}">UNIT</th>
                <th class="num" th:text="#{voc.chem.contsize}">kg/cont</th>
                <th class="num" th:text="#{voc.chem.contprice}">$/cont</th>
                <th th:text="#{voc.chem.pricenote}">Note</th>
                <th th:text="#{voc.col.active}">Active</th>
                <th sec:authorize="hasAnyRole('ADMIN','MANAGER')"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${chemicals}">
                <td th:text="${c.code}">577NT3</td>
                <td th:classappend="${c.materialType == 'WATER'} ? 'mat-water' : 'mat-solvent'"
                    th:text="${c.materialType}">SOLVENT</td>
                <td th:text="${c.classification}">Adhesive</td>
                <td th:text="${c.manufacturer}">Greco</td>
                <td class="num" th:text="${#numbers.formatDecimal(c.vocFactor, 1, 3)}">0.745</td>
                <td class="num" th:text="${c.pricePerKg != null ? #numbers.formatDecimal(c.pricePerKg, 1, 2) : ''}">3.47</td>
                <td class="num" th:text="${c.unit}"></td>
                <td class="num" th:text="${c.containerSizeKg != null ? #numbers.formatDecimal(c.containerSizeKg, 1, 1) : ''}"></td>
                <td class="num" th:text="${c.containerPrice != null ? #numbers.formatDecimal(c.containerPrice, 1, 2) : ''}"></td>
                <td th:text="${c.priceRefNote}"></td>
                <td th:text="${c.active} ? '✓' : '✗'">✓</td>
                <td sec:authorize="hasAnyRole('ADMIN','MANAGER')" style="white-space:nowrap;">
                    <button class="btn btn-outline-secondary btn-sm"
                            th:attr="data-json=${'{' +
                                '&quot;id&quot;:' + c.id + ',' +
                                '&quot;code&quot;:&quot;' + c.code + '&quot;,' +
                                '&quot;materialType&quot;:&quot;' + c.materialType + '&quot;,' +
                                '&quot;classification&quot;:&quot;' + (c.classification != null ? c.classification : '') + '&quot;,' +
                                '&quot;manufacturer&quot;:&quot;' + (c.manufacturer != null ? c.manufacturer : '') + '&quot;,' +
                                '&quot;vocFactor&quot;:' + c.vocFactor + ',' +
                                '&quot;pricePerKg&quot;:' + (c.pricePerKg != null ? c.pricePerKg : 0) + ',' +
                                '&quot;unit&quot;:&quot;' + (c.unit != null ? c.unit : '') + '&quot;,' +
                                '&quot;containerSizeKg&quot;:' + (c.containerSizeKg != null ? c.containerSizeKg : 0) + ',' +
                                '&quot;containerPrice&quot;:' + (c.containerPrice != null ? c.containerPrice : 0) + ',' +
                                '&quot;priceRefNote&quot;:&quot;' + (c.priceRefNote != null ? c.priceRefNote : '') + '&quot;,' +
                                '&quot;active&quot;:' + c.active + '}'}"
                            onclick="openEdit(this)">Edit</button>
                    <form th:action="@{'/voc/chemicals/delete/' + ${c.id}}" method="post" style="display:inline;"
                          th:attr="data-confirm=#{voc.confirm.title}">
                        <button class="btn btn-outline-danger btn-sm" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${chemicals.isEmpty()}">
                <td colspan="12" style="text-align:center; color:#6c757d;" th:text="#{voc.chem.none}">No chemicals yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit modal -->
<div class="modal-backdrop2" id="chemModal">
    <div class="modal-box">
        <h3 id="chemModalTitle" th:text="#{voc.chem.add}">Add Chemical</h3>
        <form th:action="@{/voc/chemicals/save}" method="post">
            <input type="hidden" name="id" id="f-id"/>
            <label th:text="#{voc.col.chemical}">Code</label>
            <input class="form-control" name="code" id="f-code" required/>
            <label th:text="#{voc.col.type}">Material Type</label>
            <select class="form-control" name="materialType" id="f-type">
                <option value="SOLVENT">SOLVENT</option>
                <option value="WATER">WATER</option>
            </select>
            <label th:text="#{voc.col.class}">Classification</label>
            <input class="form-control" name="classification" id="f-class"/>
            <label th:text="#{voc.col.manufacturer}">Manufacturer</label>
            <input class="form-control" name="manufacturer" id="f-mfr"/>
            <label th:text="#{voc.col.factor}">VOC Factor (0–1)</label>
            <input class="form-control" type="number" step="0.001" min="0" max="1" name="vocFactor" id="f-factor" value="0"/>
            <label th:text="#{voc.col.price}">Price per KG</label>
            <input class="form-control" type="number" step="0.01" min="0" name="pricePerKg" id="f-price"/>
            <label th:text="#{voc.chem.unit}">UNIT</label>
            <input class="form-control" name="unit" id="f-unit"/>
            <label th:text="#{voc.chem.contsize}">Container size (kg)</label>
            <input class="form-control" type="number" step="0.01" min="0" name="containerSizeKg" id="f-contsize"/>
            <label th:text="#{voc.chem.contprice}">Container price</label>
            <input class="form-control" type="number" step="0.01" min="0" name="containerPrice" id="f-contprice"/>
            <label th:text="#{voc.chem.pricenote}">Price note / date</label>
            <input class="form-control" name="priceRefNote" id="f-pricenote"/>
            <label th:text="#{voc.col.active}">Active</label>
            <select class="form-control" name="active" id="f-active">
                <option value="true">✓</option>
                <option value="false">✗</option>
            </select>
            <div style="margin-top:18px; display:flex; gap:8px; justify-content:flex-end;">
                <button type="button" class="btn btn-outline-secondary" onclick="closeChem()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Shared import modal + delete-confirm modal -->
<div th:replace="~{fragments/voc-fragments :: importModal('vocImportModal', @{/voc/chemicals/import}, #{voc.import.cols.chemicals})}"></div>
<div th:replace="~{fragments/voc-fragments :: confirmModal}"></div>

<script>
    function openAdd() {
        document.getElementById('f-id').value = '';
        document.getElementById('f-code').value = '';
        document.getElementById('f-type').value = 'SOLVENT';
        document.getElementById('f-class').value = '';
        document.getElementById('f-mfr').value = '';
        document.getElementById('f-factor').value = '0';
        document.getElementById('f-price').value = '';
        document.getElementById('f-unit').value = '';
        document.getElementById('f-contsize').value = '';
        document.getElementById('f-contprice').value = '';
        document.getElementById('f-pricenote').value = '';
        document.getElementById('f-active').value = 'true';
        document.getElementById('chemModal').classList.add('open');
    }
    function openEdit(btn) {
        const d = JSON.parse(btn.getAttribute('data-json'));
        document.getElementById('f-id').value = d.id;
        document.getElementById('f-code').value = d.code;
        document.getElementById('f-type').value = d.materialType;
        document.getElementById('f-class').value = d.classification;
        document.getElementById('f-mfr').value = d.manufacturer;
        document.getElementById('f-factor').value = d.vocFactor;
        document.getElementById('f-price').value = d.pricePerKg;
        document.getElementById('f-unit').value = d.unit || '';
        document.getElementById('f-contsize').value = d.containerSizeKg || '';
        document.getElementById('f-contprice').value = d.containerPrice || '';
        document.getElementById('f-pricenote').value = d.priceRefNote || '';
        document.getElementById('f-active').value = String(d.active);
        document.getElementById('chemModal').classList.add('open');
    }
    function closeChem() { document.getElementById('chemModal').classList.remove('open'); }
</script>
</body>
</html>
