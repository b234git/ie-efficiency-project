<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eff Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script th:src="@{/js/main.js}"></script>
</head>

<body>

    <div class="navbar" th:fragment="navbar">
        <div class="navbar-brand">
            <img th:src="@{/images/Drawing1-removebg-preview_Nero_AI_Image_Upscaler_Standard_Face.png}"
                 alt="logo">
            <h2><a th:href="@{/home}" th:text="#{nav.title}">System Dashboard</a></h2>
        </div>

        <div class="navbar-auth" sec:authorize="isAuthenticated()" data-navbar-root>
            <button class="navbar-toggle" type="button" data-nav-toggle aria-expanded="false"
                    th:attr="aria-label=#{nav.menu}">
                <span class="navbar-toggle-icon">&#9776;</span>
                <span class="navbar-toggle-label" th:text="#{nav.menu}">Menu</span>
            </button>

            <div class="navbar-menu-panel" data-nav-panel>
                <div class="navbar-menu-groups">
                    <div class="nav-hub is-open">
                        <button class="nav-hub-toggle" type="button" data-hub-toggle aria-expanded="true">
                            <span th:text="#{nav.hub.entry}">Entry</span>
                            <span class="nav-hub-caret">&#9662;</span>
                        </button>
                        <div class="nav-hub-links">
                            <a class="nav-panel-link" sec:authorize="hasAnyRole('MANAGER', 'ADMIN')"
                               th:href="@{/entry/}" th:text="#{nav.entry}">Entry</a>
                            <a class="nav-panel-link" sec:authorize="hasAnyRole('USER', 'MANAGER', 'ADMIN')"
                               th:href="@{/split-entry/}" th:text="#{nav.splitentry}">Split Entry</a>
                            <a class="nav-panel-link" sec:authorize="hasAnyRole('MANAGER', 'ADMIN')"
                               th:href="@{/report/}" th:text="#{nav.report}">Daily Report</a>
                            <a class="nav-panel-link" sec:authorize="hasAnyRole('MANAGER', 'ADMIN')"
                               th:href="@{/report/weekly}" th:text="#{nav.weekly}">Weekly Report</a>
                            <a class="nav-panel-link" sec:authorize="hasAnyRole('MANAGER', 'ADMIN')"
                               th:href="@{/masterdb/}" th:text="#{nav.masterdb}">Master DB</a>
                        </div>
                    </div>

                    <div class="nav-hub" sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">
                        <button class="nav-hub-toggle" type="button" data-hub-toggle aria-expanded="false">
                            <span th:text="#{nav.hub.salary}">Salary</span>
                            <span class="nav-hub-caret">&#9662;</span>
                        </button>
                        <div class="nav-hub-links">
                            <a class="nav-panel-link" th:href="@{/eff-config/}"
                               th:text="#{nav.effconfig}">EFF Config</a>
                            <a class="nav-panel-link" th:href="@{/weekly-tracking/}"
                               th:text="#{nav.weeklytracking}">Weekly Tracking</a>
                            <a class="nav-panel-link" th:href="@{/new-style/}"
                               th:text="#{nav.newstyle}">New Style</a>
                            <a class="nav-panel-link" th:href="@{/salary/}"
                               th:text="#{nav.salary}">Salary Bonus</a>
                        </div>
                    </div>

                    <a class="nav-panel-link nav-standalone-link" sec:authorize="hasRole('ADMIN')"
                       th:href="@{/admin/}" th:text="#{nav.admin}">Admin</a>
                    <a class="nav-panel-link nav-standalone-link" sec:authorize="hasRole('ADMIN')"
                       th:href="@{/admin/system}" th:text="#{nav.systemhealth}">System Health</a>
                </div>

                <div class="navbar-panel-utility">
                    <span class="navbar-user"
                          th:text="#{nav.welcome} + ' ' + ${#authentication.name} + '!'">Welcome!</span>

                    <div class="navbar-utility-row">
                        <a class="navbar-notification" sec:authorize="hasAnyRole('MANAGER', 'ADMIN')"
                           th:href="@{/notifications}" th:title="#{nav.notifications}">
                            <span class="navbar-notification-icon">&#128276;</span>
                            <span class="navbar-notification-badge"
                                  th:if="${notificationCount != null && notificationCount > 0}"
                                  th:text="${notificationCount}"></span>
                        </a>

                        <span class="language-switch">
                            <a th:href="@{''(lang='vi')}">VI</a>
                            <span class="language-switch-separator">|</span>
                            <a th:href="@{''(lang='en')}">EN</a>
                        </span>
                    </div>

                    <a class="nav-panel-link" th:href="@{/change-password}"
                       th:text="#{nav.changepassword}">Đổi Mật Khẩu</a>

                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-danger navbar-logout"
                                th:text="#{nav.logout}">Logout</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="navbar-guest" sec:authorize="!isAuthenticated()" data-navbar-root>
            <div class="navbar-guest-desktop">
                <a th:href="@{/login}" th:text="#{nav.login}">Login</a>
                <a th:href="@{/register}" th:text="#{nav.register}">Register</a>
                <span class="language-switch">
                    <a th:href="@{''(lang='vi')}">VI</a>
                    <span class="language-switch-separator">|</span>
                    <a th:href="@{''(lang='en')}">EN</a>
                </span>
            </div>

            <button class="navbar-toggle" type="button" data-nav-toggle aria-expanded="false"
                    th:attr="aria-label=#{nav.menu}">
                <span class="navbar-toggle-icon">&#9776;</span>
                <span class="navbar-toggle-label" th:text="#{nav.menu}">Menu</span>
            </button>

            <div class="navbar-guest-panel" data-nav-panel>
                <div class="navbar-guest-links">
                    <a class="nav-panel-link" th:href="@{/login}" th:text="#{nav.login}">Login</a>
                    <a class="nav-panel-link" th:href="@{/register}" th:text="#{nav.register}">Register</a>
                    <span class="language-switch">
                        <a th:href="@{''(lang='vi')}">VI</a>
                        <span class="language-switch-separator">|</span>
                        <a th:href="@{''(lang='en')}">EN</a>
                    </span>
                </div>
            </div>
        </div>

        <script th:src="@{/js/main.js}"></script>
        <script th:src="@{/js/api.js}"></script>
    </div>

</body>

</html>
