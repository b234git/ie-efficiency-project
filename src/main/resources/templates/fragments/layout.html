<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Eff Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script th:src="@{/js/main.js}"></script>
</head>

<body>

    <div class="navbar" th:fragment="navbar">
        <div>
            <h2><a th:href="@{/home}" th:text="#{nav.title}">System Dashboard</a></h2>
        </div>
        <div sec:authorize="isAuthenticated()">
            <span style="margin-right: 15px;"
                th:text="#{nav.welcome} + ' ' + ${#authentication.name} + '!'">Welcome!</span>

            <a sec:authorize="hasAnyRole('USER', 'MANAGER', 'ADMIN')" th:href="@{/entry/}"
                th:text="#{nav.entry}">Entry</a>
            <a sec:authorize="hasAnyRole('USER', 'MANAGER', 'ADMIN')" th:href="@{/split-entry/}"
                th:text="#{nav.splitentry}">Split Entry</a>
            <a sec:authorize="hasAnyRole('MANAGER', 'ADMIN')" th:href="@{/report/}" th:text="#{nav.report}">Report</a>
            <a sec:authorize="hasAnyRole('MANAGER', 'ADMIN')" th:href="@{/report/weekly}" th:text="#{nav.weekly}">Weekly</a>
            <a sec:authorize="hasAnyRole('USER', 'MANAGER', 'ADMIN')" th:href="@{/masterdb/}"
                th:text="#{nav.masterdb}">Master DB</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/}" th:text="#{nav.admin}">Admin</a>

            <!-- Notification bell — ADMIN/MANAGER only -->
            <a sec:authorize="hasAnyRole('MANAGER', 'ADMIN')" th:href="@{/notifications}"
                style="position:relative; text-decoration:none; margin-left:6px;">
                &#x1F514;
                <span th:if="${notificationCount != null && notificationCount > 0}"
                    style="position:absolute; top:-6px; right:-8px; background:#dc3545; color:white;
                           font-size:0.7rem; padding:1px 5px; border-radius:10px; font-weight:700;"
                    th:text="${notificationCount}"></span>
            </a>

            <!-- Language toggle -->
            <span style="margin-left:10px; border-left:1px solid rgba(255,255,255,0.3); padding-left:10px;">
                <a th:href="@{''(lang='vi')}" style="font-weight:600; text-decoration:none;">🇻🇳 VI</a>
                <span style="opacity:0.4; margin:0 4px;">|</span>
                <a th:href="@{''(lang='en')}" style="font-weight:600; text-decoration:none;">🇬🇧 EN</a>
            </span>

            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-danger" style="padding: 5px 10px;"
                    th:text="#{nav.logout}">Logout</button>
            </form>
        </div>
        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" th:text="#{nav.login}">Login</a>
            <a th:href="@{/register}" th:text="#{nav.register}">Register</a>
            <!-- Language toggle for non-auth -->
            <span style="margin-left:10px;">
                <a th:href="@{''(lang='vi')}" style="font-weight:600;">🇻🇳 VI</a>
                <span style="opacity:0.4; margin:0 4px;">|</span>
                <a th:href="@{''(lang='en')}" style="font-weight:600;">🇬🇧 EN</a>
            </span>
        </div>
    </div>

</body>

</html>
