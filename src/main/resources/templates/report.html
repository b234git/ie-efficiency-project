<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title th:text="#{report.title}">Production Report</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .filter-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .range-badge {
            padding: 8px 14px;
            background: #e7f3ff;
            border-left: 4px solid #0d6efd;
            border-radius: 4px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        table th,
        table td {
            font-size: 0.85rem;
            padding: 6px 10px;
            white-space: nowrap;
        }

        td.num {
            text-align: right;
        }

        .eff-cell {
            font-weight: 700;
        }

        .eff-hi {
            color: #28a745;
        }

        .eff-mid {
            color: #fd7e14;
        }

        .eff-low {
            color: #dc3545;
        }

        .stat-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .stat-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px 20px;
            min-width: 130px;
            text-align: center;
        }

        .stat-card .val {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-card .lbl {
            font-size: 0.78rem;
            color: #6c757d;
        }

        .empty-msg {
            text-align: center;
            color: #888;
            padding: 30px;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container" style="max-width:1400px; padding:20px;">

        <!-- Header -->
        <div
            style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
            <div>
                <h2 style="margin:0;" th:text="#{report.title}">Production Report</h2>
                <small style="color:#6c757d;" th:text="#{report.subtitle}">Efficiency report</small>
            </div>
        </div>

        <!-- Filter bar -->
        <form th:action="@{/report/}" method="get">
            <div class="filter-bar"
                style="margin-bottom: 15px; background: #f8f9fa; padding: 10px 15px; border-radius: 6px; border: 1px solid #dee2e6;">
                <div style="font-weight:600; margin-right:6px; color: #495057;">🔍 Filter:</div>

                <!-- Filter Date -->
                <div style="display: flex; align-items: center; gap: 5px; margin-right: 15px;">
                    <label style="font-size: 0.9em; margin: 0;">Date</label>
                    <select name="filterDate" class="form-control form-control-sm" style="width: auto;">
                        <option value="">- All -</option>
                        <option th:each="d : ${availableDates}" th:value="${d}" th:text="${d}"
                            th:selected="${filterDate == d.toString()}"></option>
                    </select>
                </div>

                <!-- Filter Section -->
                <div style="display: flex; align-items: center; gap: 5px; margin-right: 15px;">
                    <label style="font-size: 0.9em; margin: 0;">Section</label>
                    <select name="filterSection" class="form-control form-control-sm" style="width: auto;">
                        <option value="">- All -</option>
                        <option th:each="sec : ${availableSections}" th:value="${sec}" th:text="${sec}"
                            th:selected="${filterSection == sec}"></option>
                    </select>
                </div>

                <!-- Filter Line -->
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label style="font-size: 0.9em; margin: 0;">Line</label>
                    <select name="filterLineNum" class="form-control form-control-sm" style="width: auto;">
                        <option value="">- All -</option>
                        <option th:each="ln : ${availableLineNums}" th:value="${ln}" th:text="${ln}"
                            th:selected="${filterLineNum == ln}"></option>
                    </select>
                    <input type="text" name="filterLineChar" th:value="${filterLineChar}"
                        class="form-control form-control-sm" placeholder="Char" style="width: 70px;">
                </div>
            </div>

            <div class="filter-bar">
                <div>
                    <label style="font-weight:600; margin-right:6px;" th:text="#{dashboard.viewby}">View by</label>
                    <select id="rangeSelect" name="range" class="form-control"
                        style="width:210px; display:inline-block;" onchange="handleRangeChange(this.value)">
                        <option value="TODAY" th:selected="${selectedRange == 'TODAY'}"
                            th:text="'📅 ' + #{dashboard.oneday}">📅 Specific date</option>
                        <option value="1M" th:selected="${selectedRange == '1M'}"
                            th:text="'📆 ' + #{dashboard.onemonth}">📆
                            Last 1 month</option>
                        <option value="6M" th:selected="${selectedRange == '6M'}"
                            th:text="'🗓 ' + #{dashboard.sixmonths}">
                            🗓 Last 6 months</option>
                        <option value="ALL" th:selected="${selectedRange == 'ALL'}"
                            th:text="'♾️ ' + #{dashboard.alltime}">
                            ♾️ All time</option>
                    </select>
                </div>

                <div id="datePicker" th:style="${selectedRange != 'TODAY'} ? 'display:none' : ''">
                    <label style="margin-right:6px;" th:text="#{dashboard.date}">Date:</label>
                    <input type="date" name="date" th:value="${selectedDate}" class="form-control"
                        style="width:180px; display:inline-block;" />
                </div>

                <div style="display: flex; gap: 10px;">
                    <input type="text" name="pattern" th:value="${pattern}" class="form-control"
                        placeholder="Tìm kiếm Pattern #..." style="width:180px;" />
                    <input type="text" name="article" th:value="${article}" class="form-control"
                        placeholder="Tìm kiếm Article / Style..." style="width:180px;" />
                </div>
                <button type="submit" class="btn btn-primary" th:text="#{report.view}">View</button>
            </div>
        </form>

        <!-- Range badge -->
        <div th:if="${rangeLabel != null and !rangeLabel.isEmpty()}" class="range-badge">
            🔍 <span th:text="${rangeLabel}"></span>
            &nbsp;·&nbsp; <strong th:text="${#lists.size(records)}">0</strong> records
        </div>

        <!-- Tiêu đề và Data table -->
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th th:text="#{table.date}">Date</th>
                        <th th:text="#{table.section}">Section</th>
                        <th th:text="#{table.line}">Line</th>
                        <th>Pattern #</th>
                        <th>Style</th>
                        <th>Article #</th>
                        <th th:text="#{table.output}">Output</th>
                        <th>DL (MP)</th>
                        <th th:text="#{table.wt}">WT (h)</th>
                        <th>EFF KPI</th>
                        <th>RFT%</th>
                        <th>EFF Salary</th>
                        <th>STD PPH</th>
                        <th>ACTUAL PPH</th>
                        <th th:text="#{table.target}">Target</th>

                        <th>DLI</th>
                        <th>IDL</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${records.isEmpty()}">
                        <td colspan="17" class="empty-msg" th:text="#{table.nodata}">No data available.</td>
                    </tr>
                    <tr th:each="rec : ${records}">
                        <td th:text="${rec.productionDate}"></td>
                        <td><strong th:text="${rec.section}"></strong></td>
                        <td th:text="${rec.line}"></td>
                        <td>
                            <span th:if="${rec.patternNo != null}" th:text="${rec.patternNo}"></span>
                            <span th:if="${rec.patternNo == null}" style="color:#dc3545; cursor:help;"
                                  title="Pattern not found in MasterDb">-
                                <span style="display:inline-block; width:14px; height:14px; line-height:14px; text-align:center; border-radius:50%; background:#ffc107; color:#000; font-size:10px; font-weight:bold; vertical-align:middle;">!</span>
                            </span>
                        </td>
                        <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis;">
                            <span th:if="${rec.shoeName != null}" th:text="${rec.shoeName}"></span>
                            <span th:if="${rec.shoeName == null}" style="color:#dc3545; cursor:help;"
                                  title="Style not found in MasterDb">-
                                <span style="display:inline-block; width:14px; height:14px; line-height:14px; text-align:center; border-radius:50%; background:#ffc107; color:#000; font-size:10px; font-weight:bold; vertical-align:middle;">!</span>
                            </span>
                        </td>
                        <td th:text="${rec.article != null ? rec.article : '-'}"></td>
                        <td class="num"><strong th:text="${rec.output != null ? rec.output : '-'}"></strong></td>
                        <td class="num" th:text="${rec.mp != null ? rec.mp : '-'}"></td>
                        <td class="num" th:text="${rec.wt != null ? rec.wt : '-'}"></td>
                        <td class="num eff-cell"
                            th:classappend="${rec.effKpi != null and rec.effKpi >= 0.795 ? 'eff-hi' : 'eff-low'}">
                            <span th:if="${rec.effKpi != null}" th:text="${#numbers.formatDecimal(rec.effKpi * 100, 1, 2) + '%'}"></span>
                            <span th:if="${rec.effKpi == null}" style="cursor:help;"
                                  th:title="${rec.effKpiReason != null ? rec.effKpiReason : 'Unknown reason'}">-
                                <span style="display:inline-block; width:16px; height:16px; line-height:16px; text-align:center; border-radius:50%; background:#ffc107; color:#000; font-size:11px; font-weight:bold; vertical-align:middle;">!</span>
                            </span>
                        </td>
                        <td class="num"
                            th:text="${rec.rft != null ? #numbers.formatDecimal(rec.rft <= 1.0 ? rec.rft * 100 : rec.rft, 1, 2) + '%' : '-'}"></td>
                        <td class="num eff-cell"
                            th:classappend="${rec.effSalary != null and rec.effSalary >= 0.795 ? 'eff-hi' : 'eff-low'}">
                            <span th:if="${rec.effSalary != null}" th:text="${#numbers.formatDecimal(rec.effSalary * 100, 1, 2) + '%'}"></span>
                            <span th:if="${rec.effSalary == null}" style="cursor:help;"
                                  th:title="${rec.effSalaryReason != null ? rec.effSalaryReason : 'Unknown reason'}">-
                                <span style="display:inline-block; width:16px; height:16px; line-height:16px; text-align:center; border-radius:50%; background:#ffc107; color:#000; font-size:11px; font-weight:bold; vertical-align:middle;">!</span>
                            </span>
                        </td>
                        <td class="num">
                            <span th:if="${rec.stdPph != null}" th:text="${#numbers.formatDecimal(rec.stdPph, 1, 2)}"></span>
                            <span th:if="${rec.stdPph == null}" style="color:#dc3545; cursor:help;"
                                  title="STD PPH not available (missing MasterDb data for this section)">-
                                <span style="display:inline-block; width:14px; height:14px; line-height:14px; text-align:center; border-radius:50%; background:#ffc107; color:#000; font-size:10px; font-weight:bold; vertical-align:middle;">!</span>
                            </span>
                        </td>
                        <td class="num eff-cell"
                            th:classappend="${rec.actualPph != null and rec.stdPph != null ? (rec.actualPph >= rec.stdPph ? 'eff-hi' : 'eff-low') : ''}"
                            th:text="${rec.actualPph != null ? #numbers.formatDecimal(rec.actualPph, 1, 2) : '-'}"></td>
                        <td class="num"
                            th:text="${rec.target != null ? #numbers.formatDecimal(rec.target, 1, 2) : '-'}"></td>

                        <td class="num" th:text="${rec.dli != null ? rec.dli : '-'}"></td>
                        <td class="num" th:text="${rec.idl != null ? rec.idl : '-'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        function handleRangeChange(val) {
            document.getElementById('datePicker').style.display = (val === 'TODAY') ? '' : 'none';
        }
    </script>
</body>

</html>
