<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title th:text="#{daily.report.title}">Daily Production Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .filter-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 18px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            padding: 12px 0;
        }

        .range-badge {
            padding: 8px 14px;
            background: #e7f3ff;
            border-left: 4px solid #0d6efd;
            border-radius: 4px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        table th,
        table td {
            font-size: 0.85rem;
            padding: 6px 10px;
            white-space: nowrap;
        }

        td.num {
            text-align: right;
        }

        .eff-cell {
            font-weight: 700;
        }

        .eff-hi {
            color: #28a745;
        }

        .eff-mid {
            color: #fd7e14;
        }

        .eff-low {
            color: #dc3545;
        }

        .stat-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .stat-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px 20px;
            min-width: 130px;
            text-align: center;
        }

        .stat-card .val {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-card .lbl {
            font-size: 0.78rem;
            color: #6c757d;
        }

        .empty-msg {
            text-align: center;
            color: #888;
            padding: 30px;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container-lg">

        <!-- Header -->
        <div class="page-header-flex">
            <div>
                <h2 style="margin:0;" th:text="#{daily.report.title}">Daily Production Report</h2>
                <small style="color:#6c757d;" th:text="#{report.subtitle}">Efficiency report</small>
            </div>
        </div>

        <!-- Filter bar -->
        <form th:action="@{/report/}" method="get" class="filter-bar">
            <div>
                <label style="font-weight:600; margin-right:6px;" th:text="#{dashboard.viewby}">View by</label>
                <select id="rangeSelect" name="range" class="form-control" style="width:210px; display:inline-block;"
                    onchange="handleRangeChange(this.value)">
                    <option value="TODAY" th:selected="${selectedRange == 'TODAY'}"
                        th:text="'📅 ' + #{dashboard.oneday}">📅 Specific date</option>
                    <option value="1M" th:selected="${selectedRange == '1M'}" th:text="'📆 ' + #{dashboard.onemonth}">📆
                        Last 1 month</option>
                    <option value="6M" th:selected="${selectedRange == '6M'}" th:text="'🗓 ' + #{dashboard.sixmonths}">
                        🗓 Last 6 months</option>
                    <option value="ALL" th:selected="${selectedRange == 'ALL'}" th:text="'♾️ ' + #{dashboard.alltime}">
                        ♾️ All time</option>
                    <option value="CUSTOM" th:selected="${selectedRange == 'CUSTOM'}"
                        th:text="'📋 ' + #{report.custom}">📋 Custom Range</option>
                </select>
            </div>

            <div id="datePicker" th:style="${selectedRange != 'TODAY'} ? 'display:none' : ''">
                <label style="margin-right:6px;" th:text="#{dashboard.date}">Date:</label>
                <input type="date" name="date" th:value="${selectedDate}" class="form-control"
                    style="width:180px; display:inline-block;" />
            </div>

            <div id="customDatePicker" th:style="${selectedRange != 'CUSTOM'} ? 'display:none' : ''">
                <label style="margin-right:4px;" th:text="#{report.from}">From</label>
                <input type="date" name="dateFrom" th:value="${dateFrom}" class="form-control"
                    style="width:160px; display:inline-block;" />
                <label style="margin: 0 4px;" th:text="#{report.to}">To</label>
                <input type="date" name="dateTo" th:value="${dateTo}" class="form-control"
                    style="width:160px; display:inline-block;" />
            </div>

            <div>
                <input type="text" name="article" th:value="${article}" class="form-control"
                    placeholder="Tìm kiếm Article..." style="width:180px; display:inline-block;" />
            </div>

            <div>
                <select name="section" class="form-control" style="width:130px; display:inline-block;">
                    <option value="" th:text="#{report.allsections}">All Sections</option>
                    <option th:each="sec : ${sections}" th:value="${sec}" th:text="${sec}"
                        th:selected="${sec == selectedSection}"></option>
                </select>
            </div>

            <div>
                <select name="line" class="form-control" style="width:100px; display:inline-block;">
                    <option value="" th:text="#{report.alllines}">All Lines</option>
                    <option th:each="ln : ${lines}" th:value="${ln}" th:text="${ln}"
                        th:selected="${ln == selectedLine}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" th:text="#{report.view}">View</button>
            <button type="submit" formaction="/report/export" class="btn btn-success">Export Excel</button>
        </form>

        <!-- Range badge -->
        <div th:if="${rangeLabel != null and !rangeLabel.isEmpty()}" class="range-badge">
            🔍 <span th:text="${rangeLabel}"></span>
            &nbsp;·&nbsp; <strong th:text="${#lists.size(records)}">0</strong> records
        </div>

        <!-- Tiêu đề và Data table -->
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th th:text="#{table.date}">Date</th>
                        <th th:text="#{table.section}">Section</th>
                        <th th:text="#{table.line}">Line</th>
                        <th>Pattern #</th>
                        <th>Style</th>
                        <th>Article #</th>
                        <th th:text="#{table.output}">Output</th>
                        <th th:text="#{table.target}">Target</th>
                        <th th:text="#{table.wt}">WT (h)</th>
                        <th>DL (MP)</th>
                        <th>Actual MP</th>
                        <th>Actual PPH</th>
                        <th>Std PPH</th>
                        <th>EFF KPI</th>
                        <th>RFT%</th>

                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${records.isEmpty()}">
                        <td colspan="17" class="empty-msg" th:text="#{table.nodata}">No data available.</td>
                    </tr>
                    <tr th:each="rec, stat : ${records}">
                        <td th:text="${stat.count}" style="color:#6c757d;"></td>
                        <td th:text="${rec.productionDate}"></td>
                        <td><strong th:text="${#strings.substringBefore(rec.section + ' ', ' ')}"></strong></td>
                        <td th:text="${rec.line}"></td>
                        <td th:text="${rec.patternNo != null ? rec.patternNo : '-'}"></td>
                        <td th:text="${rec.shoeName != null ? rec.shoeName : '-'}"
                            style="max-width:200px; overflow:hidden; text-overflow:ellipsis;"></td>
                        <td th:text="${rec.article != null ? rec.article : '-'}"></td>
                        <td class="num"><strong th:text="${rec.output != null ? rec.output : '-'}"></strong></td>
                        <td class="num"
                            th:text="${rec.target != null ? #numbers.formatDecimal(rec.target, 1, 0) : '-'}"></td>
                        <td class="num" th:text="${rec.wt != null ? rec.wt : '-'}"></td>
                        <td class="num" th:text="${rec.mp != null ? rec.mp : '-'}"></td>
                        <td class="num" th:text="${rec.dli != null ? rec.dli : '-'}"></td>
                        <td class="num"
                            th:text="${rec.actualPph != null ? #numbers.formatDecimal(rec.actualPph, 1, 2) : '-'}"></td>
                        <td class="num"
                            th:text="${rec.stdPph != null ? #numbers.formatDecimal(rec.stdPph, 1, 2) : '-'}"></td>
                        <td class="num eff-cell"
                            th:classappend="${rec.effKpi != null and rec.effKpi >= 1.0 ? 'eff-hi' : (rec.effKpi != null and rec.effKpi >= 0.8 ? 'eff-mid' : 'eff-low')}"
                            th:text="${rec.effKpi != null ? #numbers.formatDecimal(rec.effKpi * 100, 1, 2) + '%' : '-'}">
                        </td>
                        <td class="num"
                            th:text="${rec.rft != null ? #numbers.formatDecimal(rec.rft, 1, 2) + '%' : '-'}"></td>

                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        function handleRangeChange(val) {
            document.getElementById('datePicker').style.display = (val === 'TODAY') ? '' : 'none';
            document.getElementById('customDatePicker').style.display = (val === 'CUSTOM') ? '' : 'none';
        }
    </script>
</body>

</html>
