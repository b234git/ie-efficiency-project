<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="#{notification.title}">Notifications</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .notif-list {
            max-width: 800px;
            margin: 0 auto;
        }

        .notif-item {
            padding: 14px 18px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .notif-item.unread {
            background: #fff3cd;
            border-color: #ffecb5;
        }

        .notif-item.read {
            background: #f8f9fa;
            opacity: 0.7;
        }

        .notif-body {
            flex: 1;
        }

        .notif-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .notif-message {
            font-size: 0.9rem;
            color: #495057;
        }

        .notif-meta {
            font-size: 0.8rem;
            color: #6c757d;
            margin-top: 4px;
        }

        .notif-type {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .type-WARNING {
            background: #ffc107;
            color: #000;
        }

        .type-DANGER {
            background: #dc3545;
            color: #fff;
        }

        .type-INFO {
            background: #0d6efd;
            color: #fff;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container-sm">
        <div class="page-header-flex">
            <h2 th:text="#{notification.title}">Notifications</h2>
            <button type="button" class="btn btn-primary" style="padding:6px 16px;"
                data-dismiss-all th:text="#{notification.dismiss.all}">
                Mark all as read
            </button>
        </div>

        <div class="notif-list" data-notif-list>
            <div th:if="${#lists.isEmpty(notifications)}" data-notif-empty
                style="text-align:center; color:#6c757d; padding:40px;"
                th:text="#{notification.empty}">
                No notifications.
            </div>

            <div th:each="n : ${notifications}" class="notif-item"
                th:classappend="${n.isRead ? 'read' : 'unread'}"
                th:attr="data-notif-id=${n.id}">
                <div class="notif-body">
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span class="notif-type" th:classappend="'type-' + ${n.type}" th:text="${n.type}"></span>
                        <span class="notif-title" th:text="${n.title}"></span>
                    </div>
                    <div class="notif-message" th:text="${n.message}"></div>
                    <div class="notif-meta"
                        th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
                </div>
                <button th:if="${!n.isRead}" type="button" class="btn btn-sm"
                    style="border:1px solid #ccc; padding:4px 10px; font-size:0.8rem; background:white; cursor:pointer;"
                    th:attr="data-mark-read=${n.id}"
                    th:text="#{notification.mark.read}">
                    Mark as read
                </button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        (function () {
            var msgMarkedRead = /*[[#{notification.toast.marked.read}]]*/ 'Marked as read.';
            var msgDismissedAll = /*[[#{notification.toast.dismissed.all}]]*/ 'All notifications marked as read.';
            var msgError = /*[[#{notification.toast.error}]]*/ 'Action failed. Please try again.';

            function markRead(id, button) {
                window.api.fetchJson('/api/v1/notifications/' + encodeURIComponent(id) + '/read', { method: 'PUT' })
                    .then(function () {
                        var item = button.closest('.notif-item');
                        if (item) {
                            item.classList.remove('unread');
                            item.classList.add('read');
                        }
                        if (button) {
                            button.remove();
                        }
                        window.api.toast('success', msgMarkedRead);
                    })
                    .catch(function (err) {
                        window.api.toast('error', (err && err.message) || msgError);
                    });
            }

            function dismissAll(button) {
                window.api.fetchJson('/api/v1/notifications/dismiss-all', { method: 'POST' })
                    .then(function () {
                        document.querySelectorAll('.notif-item.unread').forEach(function (item) {
                            item.classList.remove('unread');
                            item.classList.add('read');
                            var btn = item.querySelector('[data-mark-read]');
                            if (btn) {
                                btn.remove();
                            }
                        });
                        window.api.toast('success', msgDismissedAll);
                    })
                    .catch(function (err) {
                        window.api.toast('error', (err && err.message) || msgError);
                    });
            }

            document.addEventListener('click', function (event) {
                var readBtn = event.target.closest('[data-mark-read]');
                if (readBtn) {
                    markRead(readBtn.getAttribute('data-mark-read'), readBtn);
                    return;
                }
                var dismissBtn = event.target.closest('[data-dismiss-all]');
                if (dismissBtn) {
                    dismissAll(dismissBtn);
                }
            });
        }());
    </script>
</body>

</html>
