<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="#{changepw.title}">Đổi Mật Khẩu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container" style="max-width: 400px; margin-top: 50px;">
        <h2 th:text="#{changepw.title}">Đổi Mật Khẩu</h2>

        <div th:if="${success}" class="alert-success" role="alert"
             th:text="#{changepw.success}">Đổi mật khẩu thành công.</div>

        <div th:if="${error == 'wrongCurrent'}" class="alert-error" role="alert"
             th:text="#{changepw.error.wrongCurrent}">Mật khẩu hiện tại không đúng.</div>
        <div th:if="${error == 'confirmMismatch'}" class="alert-error" role="alert"
             th:text="#{changepw.error.confirmMismatch}">Mật khẩu mới không khớp.</div>
        <div th:if="${error == 'tooShort'}" class="alert-error" role="alert"
             th:text="#{changepw.error.tooShort}">Mật khẩu phải ít nhất 6 ký tự.</div>

        <form th:action="@{/change-password}" method="post">
            <div class="form-group">
                <label for="currentPassword" th:text="#{changepw.current}">Mật khẩu hiện tại</label>
                <div class="password-wrapper">
                    <input type="password" id="currentPassword" name="currentPassword"
                           class="form-control" required autocomplete="current-password" />
                    <button type="button" class="btn-password-toggle"
                            onclick="togglePassword('currentPassword', this)"
                            aria-label="Hiện/ẩn mật khẩu">&#128065;</button>
                </div>
            </div>
            <div class="form-group">
                <label for="newPassword" th:text="#{changepw.new}">Mật khẩu mới</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" name="newPassword"
                           class="form-control" required autocomplete="new-password" />
                    <button type="button" class="btn-password-toggle"
                            onclick="togglePassword('newPassword', this)"
                            aria-label="Hiện/ẩn mật khẩu">&#128065;</button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword" th:text="#{changepw.confirm}">Xác nhận mật khẩu mới</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           class="form-control" required autocomplete="new-password" />
                    <button type="button" class="btn-password-toggle"
                            onclick="togglePassword('confirmPassword', this)"
                            aria-label="Hiện/ẩn mật khẩu">&#128065;</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;"
                    th:text="#{changepw.submit}">Cập nhật</button>
        </form>
    </div>

    <script th:src="@{/js/main.js}"></script>
</body>

</html>
