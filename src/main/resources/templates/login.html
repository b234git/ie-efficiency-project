<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="#{login.title}">Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container" style="max-width: 400px; margin-top: 50px;">
        <h2 th:text="#{login.title}">Login</h2>

        <div th:if="${param.error}" style="color: red; margin-bottom: 10px;" th:text="#{login.error}">Invalid username
            and password.</div>
        <div th:if="${param.logout}" style="color: green; margin-bottom: 10px;" th:text="#{login.logout}">You have been
            logged out.</div>
        <div th:if="${param.success}" style="color: green; margin-bottom: 10px;" th:text="#{login.success}">Registration
            successful. Please log in.</div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label th:text="#{login.username}">Username</label>
                <input type="text" name="username" class="form-control" required autofocus />
            </div>
            <div class="form-group">
                <label th:text="#{login.password}">Password</label>
                <input type="password" name="password" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;" th:text="#{login.submit}">Sign
                In</button>
        </form>
        <div style="margin-top: 15px; text-align: center;">
            <a th:href="@{/register}" th:text="#{login.create.account}">Create an account</a>
        </div>
    </div>
</body>

</html>
