# ============================================================
# PRODUCTION PROFILE — application-prod.properties
# Run with: java -jar app.jar --spring.profiles.active=prod
# All sensitive values MUST be provided via environment vars
# ============================================================

# Database — override với env vars trên server
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Seed user passwords — required env vars, app fails to start if not set
app.default-admin-password=${APP_DEFAULT_ADMIN_PASSWORD}
app.default-manager-password=${APP_DEFAULT_MANAGER_PASSWORD}

# JPA — Flyway quản lý schema, Hibernate chỉ validate
spring.jpa.hibernate.ddl-auto=validate

# Flyway — DB prod hiện có được baseline ở V16 (schema đã được cập nhật tay tới đó);
# V17 catch-up idempotent tự tạo phần còn thiếu (bảng/cột VOC, feature grant) khi boot.
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=16
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Base profile sets these to DEBUG/TRACE for dev; quiet them in prod so bulk imports
# don't log every SQL + transaction step (show-sql alone doesn't cover the SLF4J loggers).
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.transaction.interceptor=WARN

# Thymeleaf — bật cache trên production
spring.thymeleaf.cache=true

# Server
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Session timeout
server.servlet.session.timeout=30m

# File upload limit — sized to the largest real workbook (~12MB EFF V6) with headroom.
# Keeps POI's in-memory parse from being weaponised into an OOM by an authenticated user.
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# HikariCP connection pool (sized to match docs/SERVER_CONFIG.md for 100-user load)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=15
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Tomcat thread pool — explicit for 100 concurrent users
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=25
server.tomcat.accept-count=150
server.tomcat.max-connections=8192

# HTTP compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=2048

# Management endpoints — bound to localhost-only port so health/metrics/info
# are reachable for the reverse proxy probe and local scrapers, never from LAN.
management.server.port=8081
management.server.address=127.0.0.1
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Quartz — schema đã được Flyway/manual init, không cần re-create mỗi startup
spring.quartz.jdbc.initialize-schema=never
