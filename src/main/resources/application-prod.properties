# ============================================================
# PRODUCTION PROFILE — application-prod.properties
# Run with: java -jar app.jar --spring.profiles.active=prod
# All sensitive values MUST be provided via environment vars
# ============================================================

# Database — override với env vars trên server
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA — chỉ validate schema, không tự sửa
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf — bật cache trên production
spring.thymeleaf.cache=true

# Server
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# File upload limit
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Spring Actuator — chỉ expose /health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
