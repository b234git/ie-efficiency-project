# Nginx reverse proxy for IE-Eff.
# Used only when the `proxy` compose profile is enabled.
# Place TLS cert + key at deploy/certs/fullchain.pem and deploy/certs/privkey.pem.

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Must match Spring's spring.servlet.multipart.max-request-size (100 MB).
    client_max_body_size 100M;

    proxy_read_timeout    120s;
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;
    }

    # Do NOT proxy the management port — it's intentionally not network-exposed.
}
