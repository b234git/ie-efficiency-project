# ============================================================================
# IE-Eff — Production-ish stack for a single Docker host (WSL Ubuntu or Linux)
# ----------------------------------------------------------------------------
# Bring up:   docker compose up -d --build
# Tear down:  docker compose down              (preserves volumes)
# Wipe DB:    docker compose down -v           (DESTROYS data — use carefully)
# Logs:       docker compose logs -f app
# Backup:     docker compose exec db pg_dump -U $DB_USERNAME $DB_NAME -F c > backup.dump
# ============================================================================

services:

  db:
    image: postgres:15-alpine
    container_name: ie-eff-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-shoe_eff_db}
      POSTGRES_USER: ${DB_USERNAME:-ie_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      # Performance hints — adjust shared_buffers up if host RAM allows.
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=150"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=1000"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ie_app} -d ${DB_NAME:-shoe_eff_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ie-eff:latest
    container_name: ie-eff-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-shoe_eff_db}
      DB_USERNAME: ${DB_USERNAME:-ie_app}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      APP_DEFAULT_ADMIN_PASSWORD: ${APP_DEFAULT_ADMIN_PASSWORD:?APP_DEFAULT_ADMIN_PASSWORD must be set in .env}
      APP_DEFAULT_MANAGER_PASSWORD: ${APP_DEFAULT_MANAGER_PASSWORD:?APP_DEFAULT_MANAGER_PASSWORD must be set in .env}
      # Override the prod localhost-only bind so Docker port-mapping can reach
      # the management port. Network isolation is enforced by mapping to
      # 127.0.0.1 on the HOST side instead (see `ports:` below).
      MANAGEMENT_SERVER_ADDRESS: 0.0.0.0
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${APP_PORT:-8080}:8080"
      # Management port stays bound to localhost on the host. WSL note:
      # this exposes port 8081 on the WSL interface, not the Windows host.
      - "127.0.0.1:${MANAGEMENT_PORT:-8081}:8081"
    volumes:
      - app-uploads:/opt/ie-eff/uploads
      - app-logs:/opt/ie-eff/logs
    networks:
      - internal

  # Optional Nginx reverse proxy for TLS termination.
  # Comment out if you terminate TLS upstream (e.g. company load balancer).
  proxy:
    image: nginx:1.27-alpine
    container_name: ie-eff-proxy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    networks:
      - internal
    profiles: ["proxy"]   # enable with: docker compose --profile proxy up -d

volumes:
  pgdata:
  app-uploads:
  app-logs:

networks:
  internal:
    driver: bridge
